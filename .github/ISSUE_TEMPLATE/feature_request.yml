name: Feature request
description: Suggest an enhancement or new capability for the prototype.
title: "feat: <short summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Keep in mind this is a **mock-data demo** of NID's
        placement portal — proposals should fit the demo posture (no real auth,
        payment, SMS, or live PII) and the project's non-negotiables (AI never
        ranks/scores/filters students, no bulk shortlisting, no demographic
        sort/filter on the recruiter side). See CONTRIBUTING.md.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: This fits the demo posture (no real auth/payment/SMS/PII required).
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what's missing today?
      placeholder: As a recruiter, I can't ... which makes the walkthrough ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Describe the behavior, not the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you set them aside.
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this affect?
      options:
        - Recruiter portal
        - Student portal
        - Admin / placement portal
        - Public pages
        - Federation API (/api)
        - Build / harness / tooling
        - Cross-cutting / multiple
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Mockups, references, or links. Redact anything sensitive.
    validations:
      required: false
