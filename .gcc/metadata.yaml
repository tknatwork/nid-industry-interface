# DB now LIVE for tooling: throwaway Postgres (docker nid-pg-throwaway, host 5433 —
# Langfuse holds 5432). packages/db: drizzle-orm 0.38.4, drizzle.config loads dotenv
# from packages/db/.env (gitignored; .env.example committed). `drizzle-kit migrate`
# created 21 tables; `seed` populated them; Drizzle Studio runs on :4983. The module
# STORES are still JSON-backed (.dev-data) — full Postgres-backed store swap is future.
# Federation Phase-2: institution writes (PUT disciplines/coordinators, POST content-
# overrides) + recruiter webhooks (events + HMAC-signed simulate) live under /api/v1.
  # native-harness: scripts/check-boundaries.mjs + check-module-contracts.mjs + eslint.config.mjs + .github/workflows/ci.yml + lefthook.yml
  # Web pages cover all 4 portals (public/recruiter/admin/student). 10 workspace modules + ml worker.

# Phase-2 federation APIs live: apps/web/app/api/{public,v1} + apps/web/lib/federation.ts.
#   public feeds (cycles.json/.ics, recruiters/past.json) · institution read (x-api-key,
#   per-campus) + POST /announcements · recruiter read-only (Bearer keyId, validated against
#   the live api-keys store → revoked key = 401) · /api/v1/openapi.json. No student PII on
#   the recruiter side; no write API on the recruiter side (deliberate guardrail).
# Admin publishing UIs: /admin/engagement opens PPT windows + meeting slots; /admin/slots
#   opens interview slots. (Cycle/content editing still display-only — future.)
# Tests: vitest in @nid/core (16 unit tests over the pure guardrails); `pnpm -r test` in CI.
# A11y: skip-link + :focus-visible + prefers-reduced-motion + lang + Devanagari + aria + main-id; no zoom-lock.

# Demo coverage now complete: every nav link in every shell resolves; the public
# site (disciplines/cycles/campuses/recruiters/contact/reports/microsites),
# recruiter portal (incl. stats/calculator/ppt/meetings/analytics/close), admin
# (incl. cycles/content/offer-adjustments/api-keys/student-conduct), and student
# (incl. report-company/conduct/coordinator/profile/feedback) are all functioning.

# Parallel-agent pattern used for the final batch: main agent builds shared
# module/shell foundation + commits FIRST, then N agents build DISJOINT page
# files (no commits/installs/shared-file edits), main verifies + commits.

# Two-language stack now live: services/ml-jd-analyzer is Python (stdlib
# http.server for the demo; FastAPI/Pydantic noted for production). TS finds it
# at ML_WORKER_URL (default http://127.0.0.1:8000); falls back gracefully if down.

